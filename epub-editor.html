<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 챕터 편집기</title>
    <!-- 압축 해제 및 재압축을 위한 JSZip 라이브러리 불러오기 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f9f9f9; line-height: 1.5; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        select, textarea, button, input { width: 100%; margin-top: 10px; box-sizing: border-box; font-size: 15px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; }
        textarea { height: 350px; font-family: monospace; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: #f4f4f4; resize: none; }
        button { background-color: #007aff; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:active { background-color: #005bb5; }
        .btn-green { background-color: #34c759; }
        .btn-green:active { background-color: #248a3d; }
        .status { font-weight: bold; margin-top: 10px; text-align: center; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning-box { background-color: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>EPUB 챕터 편집기 📖</h2>
        <p>1. 수정할 EPUB 파일을 선택하세요.</p>
        <input type="file" id="epubInput" accept=".epub">
        <p id="loadStatus" class="status"></p>
        
        <div id="editorArea" style="display:none; margin-top:10px;">
            <p>2. 수정하고 싶은 챕터(목차)를 선택하세요.</p>
            <select id="fileSelect">
                <option value="">-- 챕터 선택 --</option>
            </select>
            
            <div class="warning-box">
                ⚠️ <strong>주의:</strong> 글자 사이의 <code>&lt;p&gt;</code>, <code>&lt;br/&gt;</code> 같은 영어 괄호는 글꼴/줄바꿈 뼈대이므로 <strong>절대 지우지 말고 한글 내용만 수정하세요!</strong>
            </div>

            <p>3. 내용을 수정하세요.</p>
            <textarea id="fileContent" placeholder="여기에 챕터 내용이 표시됩니다."></textarea>
            
            <button onclick="saveChanges()" class="btn-green">현재 챕터 수정 적용 (임시 저장)</button>
            <p id="saveStatus" class="status"></p>

            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
            
            <p>4. 모든 수정을 마쳤다면, 최종 파일로 뽑아냅니다.</p>
            <button onclick="downloadEPUB()">최종 EPUB 다운로드</button>
            <p id="downloadStatus" class="status"></p>
        </div>
    </div>

    <script>
        let zip = new JSZip();
        let currentFile = "";
        
        const epubInput = document.getElementById('epubInput');
        const loadStatus = document.getElementById('loadStatus');
        const saveStatus = document.getElementById('saveStatus');
        const downloadStatus = document.getElementById('downloadStatus');
        const select = document.getElementById('fileSelect');
        const textarea = document.getElementById('fileContent');

        epubInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            loadStatus.innerText = "⏳ EPUB 목차를 분석하는 중...";
            loadStatus.className = "status";
            saveStatus.innerText = ""; downloadStatus.innerText = "";
            document.getElementById('editorArea').style.display = 'none';
            
            const reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    zip = await JSZip.loadAsync(evt.target.result);
                    
                    // 1단계: 목차 데이터(TOC)를 추출하여 '파일이름'과 '실제 챕터명(1화 등)' 매칭하기
                    let tocMap = {};
                    const ncxKey = Object.keys(zip.files).find(k => k.endsWith('.ncx'));
                    
                    if (ncxKey) {
                        const ncxContent = await zip.file(ncxKey).async("string");
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(ncxContent, "text/xml");
                        const navPoints = xmlDoc.getElementsByTagName("navPoint");
                        
                        for (let i = 0; i < navPoints.length; i++) {
                            const textEl = navPoints[i].getElementsByTagName("text")[0];
                            const contentEl = navPoints[i].getElementsByTagName("content")[0];
                            if (textEl && contentEl) {
                                const title = textEl.textContent.trim(); // "1화", "프롤로그" 등
                                const src = contentEl.getAttribute("src").split('#')[0]; 
                                const fileName = src.split('/').pop(); // "Section0001.xhtml"
                                tocMap[fileName] = title;
                            }
                        }
                    }

                    // 2단계: 화면 드롭다운(선택창)에 깔끔하게 띄우기
                    select.innerHTML = '<option value="">-- 수정할 챕터(목차) 선택 --</option>';
                    const fileKeys = Object.keys(zip.files).sort(); // 파일 번호 순서대로 정렬

                    fileKeys.forEach(function(filename) {
                        // .xml 같은 시스템 파일이나 폴더는 무시하고 HTML 본문 파일만 추출
                        if (zip.files[filename].dir || !filename.match(/\.(html|xhtml)$/i)) return;
                        
                        const justName = filename.split('/').pop(); 
                        const lowerName = justName.toLowerCase();
                        
                        // 표지(cover), 타이틀(title) 등의 껍데기 파일은 목록에서 숨김
                        if (lowerName.includes('cover') || lowerName.includes('title') || lowerName.includes('nav')) return;
                        
                        // 목차에서 찾아낸 "1화" 등의 이름 사용. (만약 못 찾으면 깔끔하게 'Section 0001' 식으로 표시)
                        let displayName = tocMap[justName];
                        if (!displayName) {
                            displayName = justName.replace(/\.[^/.]+$/, ""); 
                        }
                        
                        const option = document.createElement('option');
                        option.value = filename; // 컴퓨터가 찾을 수 있게 원본 경로는 숨겨둠
                        option.text = displayName; // 사람 눈에 보이는 건 "1화" 등 목차 이름
                        select.appendChild(option);
                    });
                    
                    document.getElementById('editorArea').style.display = 'block';
                    loadStatus.innerText = "✅ 목차 분석 완료! 원하시는 챕터를 선택하세요.";
                    loadStatus.className = "status success";
                } catch (err) {
                    loadStatus.innerText = "❌ 오류 발생: " + err.message;
                    loadStatus.className = "status error";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        select.addEventListener('change', function(e) {
            currentFile = e.target.value;
            saveStatus.innerText = "";
            if (!currentFile) {
                textarea.value = "";
                return;
            }
            zip.file(currentFile).async("string").then(function(content) {
                textarea.value = content;
            });
        });

        function saveChanges() {
            if (!currentFile) {
                alert("먼저 수정할 챕터를 선택해주세요.");
                return;
            }
            const newContent = textarea.value;
            zip.file(currentFile, newContent); 
            saveStatus.innerText = "✅ 챕터 수정 완료! (이어서 다른 챕터를 계속 수정하셔도 됩니다)";
            saveStatus.className = "status success";
        }

        function downloadEPUB() {
            downloadStatus.innerText = "⏳ 최종 파일 재포장 중... (잠시만 기다려주세요)";
            downloadStatus.className = "status";
            
            zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
            
            zip.generateAsync({
                type: "blob",
                mimeType: "application/epub+zip",
                compression: "DEFLATE",
                compressionOptions: { level: 6 }
            }).then(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "수정완료_" + epubInput.files[0].name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                downloadStatus.innerText = "✅ 다운로드 성공! 아이폰 '파일' 앱 다운로드 폴더를 확인하세요.";
                downloadStatus.className = "status success";
            }).catch(function(err) {
                downloadStatus.innerText = "❌ 다운로드 오류: " + err.message;
                downloadStatus.className = "status error";
            });
        }
    </script>
</body>
</html>

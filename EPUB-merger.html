<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 올인원 스튜디오</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #eef1f5; line-height: 1.5; margin: 0; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 20px; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 8px; border: none; background: #e0e4e8; color: #555; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #007aff; color: white; }

        input[type="text"], input[type="file"], button, select { width: 100%; margin-top: 8px; margin-bottom: 12px; box-sizing: border-box; font-size: 15px; }
        input[type="text"], select { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; }
        button { background-color: #007aff; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:active { background-color: #005bb5; }
        .btn-green { background-color: #34c759; }
        .btn-green:active { background-color: #248a3d; }
        .btn-red { background-color: #ff3b30; }
        .btn-small { width: auto; padding: 8px 12px; font-size: 13px; margin: 2px; display: inline-block; border-radius: 6px; border: none; color: white; cursor: pointer; }
        .btn-gray { background-color: #8e8e93; }
        
        .file-item, .toc-item, .search-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 8px; border: 1px solid #ddd; }
        .toc-item { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; transition: all 0.2s; }
        .toc-item input { flex-grow: 1; width: auto; margin: 0; padding: 8px; }
        .toc-controls { display: flex; width: 100%; justify-content: space-between; margin-top: 5px; }

        .status { font-weight: bold; margin-top: 10px; text-align: center; font-size: 14px; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .info-box { background-color: #e7f3fe; color: #0c5460; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div class="box">
        <div class="tab-menu">
            <button id="tabA" class="tab-btn active" onclick="switchTab('A')">A. 다중 합본기</button>
            <button id="tabB" class="tab-btn" onclick="switchTab('B')">B. 목차 에디터</button>
        </div>

        <!-- ================= [ A. 다중 합본기 화면 ] ================= -->
        <div id="sectionA">
            <h2>📚 EPUB 다중 합본기</h2>
            
            <label>1. EPUB 파일 추가</label>
            <input type="file" id="epubInputA" accept=".epub" multiple>
            <div id="fileListContainerA"></div>

            <div id="metaSectionA" style="display:none; margin-top: 20px;">
                <label>2. 파일 정보 설정</label>
                <input type="text" id="fileNameA" placeholder="저장 파일명 (예: 합본.epub)">
                <input type="text" id="bookTitleA" placeholder="책 제목">
                <input type="text" id="bookAuthorA" placeholder="저자 이름">
                <button onclick="processMergeA()" class="btn-green">분석 및 목차 생성 (1단계)</button>
                <p id="statusA1" class="status"></p>
            </div>

            <div id="tocSectionA" style="display:none; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px;">
                <label>3. 목차 정리 후 다운로드</label>
                <div id="tocListA"></div>
                <button onclick="downloadA()">최종 합본 다운로드 (2단계)</button>
                <p id="statusA2" class="status"></p>
            </div>
        </div>

        <!-- ================= [ B. 목차 정밀 에디터 화면 ] ================= -->
        <div id="sectionB" style="display:none;">
            <h2>📑 EPUB 정밀 목차 에디터</h2>

            <label>1. 수정할 EPUB 파일 1개 선택</label>
            <input type="file" id="epubInputB" accept=".epub">
            <p id="statusB1" class="status"></p>

            <div id="editorSectionB" style="display:none;">
                
                <div style="background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba; margin-top: 15px;">
                    <label style="color:#856404;">🎯 1. 들어갈 대메뉴 미리 선택</label>
                    <select id="targetParentB" style="margin-top:8px; margin-bottom:15px;"></select>

                    <label style="color:#856404;">🔍 2. 하위 항목 검색</label>
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <input type="text" id="searchKeywordB" placeholder="검색어 (예: 1화)" style="margin:0; flex:1;">
                        <button onclick="searchBodyTextB()" class="btn-green" style="margin:0; width:90px;">스캔</button>
                    </div>
                    
                    <div id="searchResultsB" style="margin-top:10px;"></div>

                    <!-- 장바구니 (대기열) 영역 -->
                    <div id="stagingAreaB" style="margin-top:20px; padding:15px; background:#e2e3e5; border-radius:8px; display:none;">
                        <label style="color:#333;">📋 3. 추가 대기열 (체크 리스트)</label>
                        <p style="font-size:12px; color:#555; margin-top:5px; margin-bottom:10px;">위에서 검색해 담은 항목들이 모여있습니다. 모두 모였다면 일괄 추가하세요!</p>
                        <div id="stagingListB" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
                        <button onclick="insertStagedTocB()" class="btn-green">지정된 대메뉴에 일괄 쏙쏙 넣기!</button>
                        <button onclick="clearStagingB()" class="btn-small btn-red" style="width:100%; margin-top:8px; padding:10px;">대기열 전체 비우기</button>
                    </div>
                </div>

                <div style="margin-top: 25px; border-top: 2px dashed #ccc; padding-top: 15px;">
                    <label>🛠 현재 전체 목차 (구조 편집)</label>
                    <div id="tocListB"></div>
                </div>

                <hr style="margin:25px 0; border:0; border-top:1px solid #ddd;">
                <button onclick="downloadB()">수정된 최종 EPUB 다운로드</button>
                <p id="statusB2" class="status"></p>
            </div>
        </div>
    </div>

    <script>
        // 공통: XML 특수문자 안전 변환 함수
        function escapeXml(unsafe) {
            if(!unsafe) return "";
            return unsafe.replace(/[<>&'"]/g, function (c) {
                switch (c) {
                    case '<': return '&lt;'; case '>': return '&gt;';
                    case '&': return '&amp;'; case '\'': return '&apos;'; case '"': return '&quot;';
                }
            });
        }

        // 공통: 위치 상관없이 안전한 상대 경로 계산 함수 (링크 깨짐 방지 핵심!)
        function getRelativePath(from, to) {
            if (!from) return to;
            let fromParts = from.split('/'); fromParts.pop(); 
            let toParts = to.split('/');
            while(fromParts.length > 0 && toParts.length > 0 && fromParts[0] === toParts[0]) {
                fromParts.shift(); toParts.shift();
            }
            return fromParts.map(() => '..').concat(toParts).join('/');
        }

        function resolvePath(basePath, relativePath) {
            let parts = basePath.split('/'); parts.pop(); 
            let relParts = relativePath.split('/');
            for (let p of relParts) {
                if (p === '.') continue;
                if (p === '..') parts.pop(); else parts.push(p);
            }
            return parts.join('/');
        }

        function switchTab(tab) {
            document.getElementById('tabA').className = tab === 'A' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabB').className = tab === 'B' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('sectionA').style.display = tab === 'A' ? 'block' : 'none';
            document.getElementById('sectionB').style.display = tab === 'B' ? 'block' : 'none';
        }

        /* ==================== [ TAB A. 다중 합본기 ] ==================== */
        let filesA = [], zipA = new JSZip(), tocA = [], coverIdA = "", titleA = "";

        document.getElementById('epubInputA').addEventListener('change', e => {
            for(let f of e.target.files) filesA.push(f); renderFilesA(); e.target.value = "";
        });

        function renderFilesA() {
            const list = document.getElementById('fileListContainerA'); list.innerHTML = "";
            document.getElementById('metaSectionA').style.display = filesA.length > 0 ? "block" : "none";
            filesA.forEach((f, i) => {
                list.innerHTML += `<div class="file-item"><b>${i+1}. ${f.name}</b>
                <div><button class="btn-small btn-gray" onclick="moveA(${i}, -1)">⬆</button><button class="btn-small btn-gray" onclick="moveA(${i}, 1)">⬇</button><button class="btn-small btn-red" onclick="remA(${i})">❌</button></div></div>`;
            });
        }
        function moveA(i, d) { if(i+d>=0 && i+d<filesA.length) { let t = filesA[i]; filesA[i] = filesA[i+d]; filesA[i+d] = t; renderFilesA(); } }
        function remA(i) { filesA.splice(i, 1); renderFilesA(); }

        async function processMergeA() {
            let stat = document.getElementById('statusA1'); stat.innerText = "⏳ 포장 중..."; stat.className="status";
            zipA = new JSZip(); zipA.file("mimetype", "application/epub+zip", {compression:"STORE"});
            let man="", spi=""; tocA = []; coverIdA = "";

            try {
                for (let i = 0; i < filesA.length; i++) {
                    let z = await JSZip.loadAsync(filesA[i]);
                    let cXml = await z.file("META-INF/container.xml").async("string");
                    let opfPath = new DOMParser().parseFromString(cXml, "text/xml").getElementsByTagName("rootfile")[0].getAttribute("full-path");
                    let opfDoc = new DOMParser().parseFromString(await z.file(opfPath).async("string"), "text/xml");
                    
                    if (i === 0) {
                        let t = opfDoc.getElementsByTagName("dc:title")[0];
                        let a = opfDoc.getElementsByTagName("dc:creator")[0];
                        let name = t ? t.textContent+"(합본)" : "합본";
                        
                        if(!document.getElementById('bookTitleA').value) document.getElementById('bookTitleA').value = name;
                        if(!document.getElementById('fileNameA').value) document.getElementById('fileNameA').value = name+".epub";
                        if(a && !document.getElementById('bookAuthorA').value) document.getElementById('bookAuthorA').value = a.textContent;
                        
                        for(let m of opfDoc.getElementsByTagName("meta")) if(m.getAttribute("name")==="cover") coverIdA = "b0_"+m.getAttribute("content");
                    }
                    for(let item of opfDoc.getElementsByTagName("item")) {
                        let id = item.getAttribute("id"), prop = item.getAttribute("properties")||"";
                        if(prop.includes("nav")) prop = prop.replace(/\bnav\b/g,"").trim();
                        let aPath = resolvePath(opfPath, item.getAttribute("href"));
                        zipA.file(`book${i}/${aPath}`, await z.file(aPath).async("arraybuffer"));
                        if(i===0 && ((prop && prop.includes("cover-image")) || id===coverIdA.replace("b0_",""))) coverIdA = `b${i}_${id}`;
                        man += `<item id="b${i}_${id}" href="book${i}/${aPath}" media-type="${item.getAttribute("media-type")}" ${prop?`properties="${prop}"`:""}/>\n`;
                    }
                    for(let ref of opfDoc.getElementsByTagName("itemref")) spi += `<itemref idref="b${i}_${ref.getAttribute("idref")}"/>\n`;

                    let ncxP = Object.keys(z.files).find(k => k.endsWith('.ncx'));
                    if(ncxP) {
                        let nMap = new DOMParser().parseFromString(await z.file(ncxP).async("string"), "text/xml").getElementsByTagName("navMap")[0];
                        if(nMap) {
                            function parseL(node, lvl) {
                                for (let c of node.children) {
                                    if(c.tagName==="navPoint") {
                                        let t = c.getElementsByTagName("text")[0], ct = c.getElementsByTagName("content")[0];
                                        if(t && ct) tocA.push({id:Math.random().toString(36).substr(2,9), title:t.textContent.trim(), src:`book${i}/${resolvePath(ncxP, ct.getAttribute("src"))}`, lvl:lvl});
                                        parseL(c, lvl+1);
                                    }
                                }
                            }
                            parseL(nMap, 0);
                        }
                    }
                }
                titleA = document.getElementById('bookTitleA').value || "합본";
                let authorA = document.getElementById('bookAuthorA').value || "작자미상";
                let master = `<?xml version="1.0" encoding="utf-8"?><package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="pid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>${escapeXml(titleA)}</dc:title><dc:creator>${escapeXml(authorA)}</dc:creator><dc:identifier id="pid">urn:uuid:${Date.now()}</dc:identifier>${coverIdA?`<meta name="cover" content="${coverIdA}"/>`:""}</metadata><manifest><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>${man}</manifest><spine toc="ncx">${spi}</spine></package>`;
                zipA.file("content.opf", master);
                zipA.file("META-INF/container.xml", `<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);
                renderTocA(); stat.innerText="✅ 완료! 목차 정리 요망."; stat.className="status success"; document.getElementById('tocSectionA').style.display="block";
            } catch(e) { stat.innerText="❌ "+e.message; stat.className="status error"; }
        }

        function renderTocA() {
            const list = document.getElementById('tocListA'); list.innerHTML="";
            tocA.forEach((item) => {
                list.innerHTML += `<div class="toc-item" style="margin-left:${item.lvl*20}px"><span style="color:#007aff;font-weight:bold">${item.lvl>0?"↳":""}</span><input type="text" id="tA_${item.id}" value="${item.title}"><button class="btn-small btn-red" onclick="remTocA('${item.id}')">❌</button></div>`;
            });
        }
        function remTocA(id) { tocA = tocA.filter(x => x.id !== id); renderTocA(); }

        async function downloadA() {
            let stat = document.getElementById('statusA2'); stat.innerText = "⏳ 생성 중..."; stat.className="status";
            let roots = [], path = [];
            tocA.forEach(item => {
                let node = {title: document.getElementById(`tA_${item.id}`).value, src: item.src, lvl: item.lvl, child: []};
                if(node.lvl===0) { roots.push(node); path=[node]; }
                else { let pD = Math.min(node.lvl-1, path.length-1); if(pD<0){roots.push(node);path=[node];}else{path[pD].child.push(node);path[pD+1]=node;path.length=pD+2;} }
            });
            
            let o=1; 
            function gN(nodes, bP) { let x=""; nodes.forEach(n=>{x+=`<navPoint id="n${o}" playOrder="${o}"><navLabel><text>${escapeXml(n.title)}</text></navLabel><content src="${getRelativePath(bP, n.src)}"/>`; o++; if(n.child.length>0) x+=gN(n.child, bP); x+=`</navPoint>`;}); return x; }
            function gH(nodes, bP) { let h=""; nodes.forEach(n=>{h+=`<li><a href="${getRelativePath(bP, n.src)}">${escapeXml(n.title)}</a>`; if(n.child.length>0) h+=`<ol>${gH(n.child, bP)}</ol>`; h+=`</li>`;}); return h; }
            
            zipA.file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3998/2012/vocab/structure/#" version="2005-1"><head><meta name="dtb:uid" content="u${Date.now()}"/></head><docTitle><text>${escapeXml(titleA)}</text></docTitle><navMap>${gN(roots, "toc.ncx")}</navMap></ncx>`);
            zipA.file("nav.xhtml", `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops"><head><title>${escapeXml(titleA)}</title></head><body><nav epub:type="toc"><h1>목차</h1><ol>${gH(roots, "nav.xhtml")}</ol></nav></body></html>`);
            
            try {
                let blob = await zipA.generateAsync({type:"blob", compression:"DEFLATE", compressionOptions:{level:6}});
                let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                let fn = document.getElementById('fileNameA').value || "합본.epub";
                a.download = fn.endsWith('.epub') ? fn : fn+".epub";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                stat.innerText="✅ 다운로드 완료!"; stat.className="status success";
            } catch(e) { stat.innerText="❌ "+e.message; stat.className="status error"; }
        }

        /* ==================== [ TAB B. 목차 정밀 에디터 (장바구니 도입) ] ==================== */
        let zipB = new JSZip(), tocB = [], spineFilesB = [], oriFilenameB = "", titleB = "";
        let stagedItemsB = []; // 장바구니 배열

        document.getElementById('epubInputB').addEventListener('change', async function(e) {
            let f = e.target.files[0]; if(!f) return; oriFilenameB = f.name;
            let stat = document.getElementById('statusB1'); stat.innerText = "⏳ 로드 중..."; stat.className="status";
            try {
                zipB = await JSZip.loadAsync(f); tocB = []; spineFilesB = []; stagedItemsB = [];
                let cXml = await zipB.file("META-INF/container.xml").async("string");
                let opfPathB = new DOMParser().parseFromString(cXml, "text/xml").getElementsByTagName("rootfile")[0].getAttribute("full-path");
                let opfDoc = new DOMParser().parseFromString(await zipB.file(opfPathB).async("string"), "text/xml");
                titleB = opfDoc.getElementsByTagName("dc:title")[0]?.textContent || "수정본";
                
                let manifest = {};
                for(let item of opfDoc.getElementsByTagName("item")) manifest[item.getAttribute("id")] = resolvePath(opfPathB, item.getAttribute("href"));
                for(let ref of opfDoc.getElementsByTagName("itemref")) {
                    let href = manifest[ref.getAttribute("idref")]; if(href && href.match(/\.(html|xhtml)$/i)) spineFilesB.push(href);
                }

                let ncxP = Object.keys(zipB.files).find(k => k.endsWith('.ncx'));
                if(ncxP) {
                    let nMap = new DOMParser().parseFromString(await zipB.file(ncxP).async("string"), "text/xml").getElementsByTagName("navMap")[0];
                    if(nMap) {
                        function parseLB(node, lvl) {
                            for (let c of node.children) {
                                if(c.tagName==="navPoint") {
                                    let t = c.getElementsByTagName("text")[0], ct = c.getElementsByTagName("content")[0];
                                    if(t && ct) tocB.push({id:Math.random().toString(36).substr(2,9), title:t.textContent.trim(), src:resolvePath(ncxP, ct.getAttribute("src")), lvl:lvl});
                                    parseLB(c, lvl+1);
                                }
                            }
                        }
                        parseLB(nMap, 0);
                    }
                }
                renderTocB(); renderStagingB(); 
                stat.innerText="✅ 완료! 검색을 시작하세요."; stat.className="status success"; document.getElementById('editorSectionB').style.display="block";
            } catch(err) { stat.innerText="❌ 오류: "+err.message; stat.className="status error"; }
        });

        // 1. 검색 기능
        async function searchBodyTextB() {
            let kw = document.getElementById('searchKeywordB').value.trim();
            let resDiv = document.getElementById('searchResultsB');
            if(!kw) { alert("검색어를 입력하세요."); return; }
            resDiv.innerHTML = "<p>⏳ 스캔 중...</p>";
            let resultsHTML = ""; let count = 0;
            
            for(let path of spineFilesB) {
                let html = await zipB.file(path).async("string");
                let doc = new DOMParser().parseFromString(html, "text/html");
                let elements = doc.querySelectorAll("p, h1, h2, h3, div");
                
                for(let i=0; i<elements.length; i++) {
                    let txt = elements[i].textContent.trim();
                    if(txt.includes(kw) && txt.length < 150 && txt.length > 0) {
                        let context = ""; let next = elements[i].nextElementSibling;
                        while(next && !context) { context = next.textContent.trim().substring(0, 30); next = next.nextElementSibling; }
                        if(!context) context = "내용 없음";
                        
                        let safeTxt = escapeXml(txt);
                        let safeCtx = escapeXml(context);
                        let fileName = path.split('/').pop();
                        
                        resultsHTML += `
                        <label class="search-item" style="display:flex; gap:10px; cursor:pointer; align-items:flex-start;">
                            <input type="checkbox" class="search-check" data-path="${path}" data-txt="${safeTxt}" data-file="${fileName}" style="width:22px; height:22px; margin-top:2px;">
                            <div style="flex:1;">
                                <div style="font-size:15px; font-weight:bold; color:#007aff;">📄 ${txt}</div>
                                <div style="font-size:12px; color:gray; margin-top:2px;">📂 파일명: ${fileName}</div>
                                <div style="font-size:13px; color:#444; margin-top:4px; background:#e9ecef; padding:6px; border-radius:5px;">💬 미리보기: "${context}..."</div>
                            </div>
                        </label>`;
                        count++;
                    }
                }
            }
            if(count > 0) {
                resDiv.innerHTML = `
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <button class="btn-small btn-gray" onclick="document.querySelectorAll('.search-check').forEach(c=>c.checked=true)">전체 선택</button>
                        <button class="btn-small btn-gray" onclick="document.querySelectorAll('.search-check').forEach(c=>c.checked=false)">선택 해제</button>
                    </div>
                    <div style="max-height:250px; overflow-y:auto; border:1px solid #ccc; border-radius:8px; padding:10px; background:#fff; margin-bottom:10px;">${resultsHTML}</div>
                    <button onclick="addToStagingB()" class="btn-green" style="background:#007aff; margin-top:0;">☑️ 선택한 항목들을 장바구니(대기열)에 담기</button>
                `;
            } else { resDiv.innerHTML = "<p style='color:red;'>결과가 없습니다.</p>"; }
        }

        // 2. 장바구니 로직
        function addToStagingB() {
            let checkboxes = document.querySelectorAll('.search-check:checked');
            let count = 0;
            checkboxes.forEach(cb => {
                stagedItemsB.push({ path: cb.getAttribute('data-path'), txt: cb.getAttribute('data-txt'), fileName: cb.getAttribute('data-file') });
                count++;
            });
            if(count > 0) {
                renderStagingB();
                document.getElementById('searchResultsB').innerHTML = `<p style='color:green; font-weight:bold;'>✅ ${count}개 항목이 장바구니에 담겼습니다! 추가 검색을 하거나 일괄 추가하세요.</p>`;
                document.getElementById('searchKeywordB').value = ""; 
            } else { alert("체크된 항목이 없습니다."); }
        }

        function renderStagingB() {
            let area = document.getElementById('stagingAreaB');
            let list = document.getElementById('stagingListB'); list.innerHTML = "";
            if(stagedItemsB.length === 0) { area.style.display = "none"; return; }
            
            area.style.display = "block";
            stagedItemsB.forEach((item, idx) => {
                list.innerHTML += `<div style="background:#fff; padding:8px; border-radius:5px; margin-bottom:5px; border:1px solid #ccc; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size:14px; font-weight:bold; color:#007aff;">${idx+1}. ${item.txt}</div>
                        <div style="font-size:11px; color:gray;">${item.fileName}</div>
                    </div>
                    <button class="btn-small btn-red" onclick="removeStagedB(${idx})" style="margin:0;">❌</button>
                </div>`;
            });
        }
        function removeStagedB(idx) { stagedItemsB.splice(idx, 1); renderStagingB(); }
        function clearStagingB() { stagedItemsB = []; renderStagingB(); }

        // 3. 드롭다운 동기화
        function refreshParentSelectB() {
            let sel = document.getElementById('targetParentB'); if(!sel) return;
            let currentVal = sel.value;
            sel.innerHTML = '<option value="">-- 부모 지정 안 함 (맨 아래에 추가) --</option>';
            tocB.forEach(item => {
                let prefix = "　".repeat(item.lvl) + (item.lvl>0?"↳ ":"");
                sel.innerHTML += `<option value="${item.id}">${prefix}${item.title}</option>`;
            });
            if(currentVal && tocB.some(x => x.id === currentVal)) sel.value = currentVal;
        }

        // 4. 일괄 삽입 및 안전 앵커 박기 로직
        async function insertStagedTocB() {
            if(stagedItemsB.length === 0) return alert("대기열이 비어있습니다.");
            let parentId = document.getElementById('targetParentB').value;
            let insertIndex = tocB.length; let targetLvl = 0;
            
            if(parentId) {
                let pIdx = tocB.findIndex(x => x.id === parentId);
                targetLvl = tocB[pIdx].lvl + 1; 
                insertIndex = pIdx + 1;
                while(insertIndex < tocB.length && tocB[insertIndex].lvl >= targetLvl) insertIndex++;
            }
            
            for(let item of stagedItemsB) {
                let html = await zipB.file(item.path).async("string");
                let anchorId = "t_" + Math.random().toString(36).substr(2,7);
                let injected = false;
                
                // 1차 시도: 안전한 DOM 파싱 방식 (구조 안 망가뜨림)
                try {
                    let parser = new DOMParser();
                    let doc = parser.parseFromString(html, "application/xhtml+xml");
                    if (!doc.querySelector("parsererror")) {
                        let elements = doc.querySelectorAll("p, h1, h2, h3, h4, h5, h6, div, span");
                        let targetEl = null;
                        for (let el of elements) { if (el.textContent.trim() === item.txt) { targetEl = el; break; } }
                        if(!targetEl) { for (let el of elements) { if (el.textContent.includes(item.txt)) { targetEl = el; break; } } }
                        if (targetEl) { targetEl.setAttribute("id", anchorId); html = new XMLSerializer().serializeToString(doc); injected = true; }
                    }
                } catch(e) {}
                
                // 2차 시도: DOM 파싱 실패 시 정규식(안전 문자열)으로 폴백
                if (!injected) {
                    let safeTxt = item.txt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
                    html = html.replace(new RegExp("(" + safeTxt + ")"), `<a id="${anchorId}"></a>$1`);
                }
                
                zipB.file(item.path, html);
                tocB.splice(insertIndex, 0, { id: Math.random().toString(36).substr(2,9), title: item.txt, src: item.path + "#" + anchorId, lvl: targetLvl });
                insertIndex++;
            }
            stagedItemsB = []; renderStagingB(); renderTocB();
            alert("✅ 대기열의 모든 항목이 지정된 위치에 완벽하게 추가되었습니다!");
        }

        // 5. 목차 관리 UI
        function renderTocB() {
            const list = document.getElementById('tocListB'); list.innerHTML="";
            tocB.forEach((item, i) => {
                list.innerHTML += `
                <div class="toc-item" style="margin-left:${item.lvl*25}px">
                    <span style="color:#007aff;font-weight:bold;font-size:18px;">${item.lvl>0?"↳":""}</span>
                    <input type="text" id="tB_${item.id}" value="${item.title}">
                    <div class="toc-controls">
                        <div><button class="btn-small btn-gray" onclick="chLvlB(${i}, -1)">↰ 레벨 빼기</button><button class="btn-small btn-gray" onclick="chLvlB(${i}, 1)">들여쓰기 ↳</button></div>
                        <div><button class="btn-small" style="background:#555;" onclick="moveB(${i}, -1)">⬆</button><button class="btn-small" style="background:#555;" onclick="moveB(${i}, 1)">⬇</button><button class="btn-small btn-red" onclick="remTocB('${item.id}')">❌</button></div>
                    </div>
                </div>`;
            });
            refreshParentSelectB();
        }

        function chLvlB(i, d) { let n = tocB[i].lvl + d; if(n >= 0 && n <= 3) { tocB[i].lvl = n; renderTocB(); } }
        function moveB(i, d) { if(i+d>=0 && i+d<tocB.length) { let t = tocB[i]; tocB[i] = tocB[i+d]; tocB[i+d] = t; renderTocB(); } }
        function remTocB(id) { tocB = tocB.filter(x => x.id !== id); renderTocB(); }

        // 6. 다운로드 (상대 경로 적용)
        async function downloadB() {
            let stat = document.getElementById('statusB2'); stat.innerText = "⏳ 파일 생성 중..."; stat.className="status";
            let roots = [], path = [];
            tocB.forEach(item => {
                let node = {title: document.getElementById(`tB_${item.id}`).value, src: item.src, lvl: item.lvl, child: []};
                if(node.lvl===0) { roots.push(node); path=[node]; }
                else { let pD = Math.min(node.lvl-1, path.length-1); if(pD<0){roots.push(node);path=[node];}else{path[pD].child.push(node);path[pD+1]=node;path.length=pD+2;} }
            });
            
            let o=1; 
            function gN(nodes, bP) { let x=""; nodes.forEach(n=>{x+=`<navPoint id="n${o}" playOrder="${o}"><navLabel><text>${escapeXml(n.title)}</text></navLabel><content src="${getRelativePath(bP, n.src)}"/>`; o++; if(n.child.length>0) x+=gN(n.child, bP); x+=`</navPoint>`;}); return x; }
            function gH(nodes, bP) { let h=""; nodes.forEach(n=>{h+=`<li><a href="${getRelativePath(bP, n.src)}">${escapeXml(n.title)}</a>`; if(n.child.length>0) h+=`<ol>${gH(n.child, bP)}</ol>`; h+=`</li>`;}); return h; }
            
            let ncxP = Object.keys(zipB.files).find(k => k.endsWith('.ncx'));
            let navP = Object.keys(zipB.files).find(k => k.endsWith('nav.xhtml') || k.endsWith('toc.xhtml'));
            
            if(ncxP) zipB.file(ncxP, `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3998/2012/vocab/structure/#" version="2005-1"><head><meta name="dtb:uid" content="u${Date.now()}"/></head><docTitle><text>${escapeXml(titleB)}</text></docTitle><navMap>${gN(roots, ncxP)}</navMap></ncx>`);
            if(navP) zipB.file(navP, `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops"><head><title>${escapeXml(titleB)}</title></head><body><nav epub:type="toc"><h1>목차</h1><ol>${gH(roots, navP)}</ol></nav></body></html>`);

            try {
                let blob = await zipB.generateAsync({type:"blob", compression:"DEFLATE", compressionOptions:{level:6}});
                let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = "목차수정_" + oriFilenameB;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                stat.innerText="✅ 성공! 애플 도서 앱에서 열어보세요."; stat.className="status success";
            } catch(e) { stat.innerText="❌ "+e.message; stat.className="status error"; }
        }
    </script>
